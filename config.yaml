# Configuration file for Flow Shop algorithms

# General settings
general:
  # input_file: "data/tai20_5.txt"
  # input_file: "data/tai20_10.txt"
  # input_file: "data/tai20_20.txt"

  # input_file: "data/tai50_5.txt"
  # input_file: "data/tai50_10.txt"
  # input_file: "data/tai50_20.txt"

  # input_file: "data/tai100_5.txt"
  # input_file: "data/tai100_10.txt"
  # input_file: "data/tai100_20.txt"

# Od tad lepsiejsze
  # input_file: "data/tai200_10.txt"
  # input_file: "data/tai200_20.txt"

  # input_file: "data/tai500_20.txt"
  instance_number: 0
  # Choose exactly one compare mode:
  # - "ils_compare"
  # - "simulated_annealing_compare"
  algorithm: "ils_compare"
  # algorithm: "simulated_annealing_compare"


visualization:
  save_plots: true
  results_folder: "results"
  # Czy generować wielokrotne wykresy zbieżności w trybie czarno-białym (druk)?
  multi_convergence_grayscale: false

algorithm_common:
  # Time limit can be specified in seconds (recommended) or milliseconds.
  time_limit_s: 0.1

quantum:
  # Backend: "simulator" (dimod SimulatedAnnealingSampler) or "dwave" (real D-Wave QPU via Leap)
  backend: "dwave"
  # D-Wave API token (required only when backend: "dwave")
  dwave_token: "fdMX-33e2e246f5df29cf5bff170adcc763d694ae4046"
  # Number of samples for QUBO solver (lower = faster, higher = better quality)
  # Reduced from 50 to 5 for performance (250x speedup vs simulated annealing)
  num_reads: 100
  # Optional: choose a specific Leap solver (e.g. "Advantage_system1", "Advantage2_prototype")
  # Leave empty/null to let the client pick a default solver for your token/account.
  solver: null
  # Optional sampler parameters forwarded to D-Wave .sample():
  # annealing_time is in microseconds (integer)
  annealing_time_us: null
  # chain_strength is a float value applied to embeddings
  chain_strength: null
  # number of spin-reversal transforms to perform (int)
  num_spin_reversal_transforms: null
  # Optional: limit maximum segment length for quantum_dynasearch (reduces O(n²) variables)
  # Set to constrain interval endpoints to max distance L_max apart
  # Leave empty/commented for full O(n²) enumeration
  L_max_dynasearch: null
  # Optional: same for quantum_motzkin
  L_max_motzkin: null

iterated_local_search:
  tabu_tenure: 10

simulated_annealing:
  initial_temp: 1000.0
  final_temp: 1.0
  alpha: 0.95
  # Time-based reheating parameters (restored 2025-10-05)
  reheat_factor: 1.5          # multiply temperature by this on stagnation (capped at initial_temp)
  stagnation_ms: 5000         # no improvement for this many ms -> attempt reheat
  temp_floor_factor: 1.0      # floor = final_temp * factor (>=1)

# Optional generator: if provided, `main.py` will generate a synthetic instance
# instead of reading from `general.input_file`.
generator:
  enabled: true
  # number of machines
  m: 20
  # number of jobs
  n: 50
  # RNG seed for reproducibility
  seed: 42
  # Taillard-only generator (no low/high)
  # type is fixed to 'taillard'

# Experiment batch mode (new)
experiment:
  enabled: true  
  tabu_tenure: 10   
      # when true: run batch experiments (all instances); false -> compare mode
  instance_files: [
    # "data/tai20_5.txt", 
    "data/tai20_10.txt", 
    # "data/tai20_20.txt",
    # "data/tai50_5.txt",
    # "data/tai50_10.txt", 
    # "data/tai50_20.txt",
    # "data/tai100_5.txt", 
    # "data/tai100_10.txt", 
    # "data/tai100_20.txt",
    # "data/tai200_10.txt", 
    # "data/tai200_20.txt",
    # "data/tai500_20.txt"
  ]
  repeats: 1             # number of RNG seeds per (algorithm, neighborhood, instance, time_limit)
  time_limits_s: [0.1, 0.5, 1, 2, 5, 10]

  # Optional: explicitly restrict which neighborhoods to run for comparisons/experiments.
  # If omitted, the code uses the full canonical set.
  neighborhoods: [
    "adjacent",
    "quantum_adjacent",
    "quantum_fibonahi",
    "quantum_dynasearch",
    "quantum_motzkin",
    "fibonahi",
    "dynasearch",
    "motzkin"
  ]




